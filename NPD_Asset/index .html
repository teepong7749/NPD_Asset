<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#05172f">
<title>ครุภัณฑ์ กพ.ทร.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════════════
   🎨 ส่วนที่ต้องแก้เอง (อ่านคอมเมนต์ "👉 แก้ตรงนี้")
   ════════════════════════════════════════════════════════ */

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{-webkit-text-size-adjust:100%;font-family:'Sarabun',sans-serif}

body{
  min-height:100vh;
  color:#1a1a2e;
  position:relative;
  overflow-x:hidden;

  /* 👉 แก้ตรงนี้ #1: รูปพื้นหลัง (background)
     ───────────────────────────────────────────
     ตอนนี้ใช้สีน้ำเงินไล่เฉดไปก่อน
     ถ้าอยากใส่รูปพื้นหลังจริง ให้:
     1. วางไฟล์รูป (เช่น bg.jpg) ไว้โฟลเดอร์เดียวกับ index.html
     2. เปลี่ยน background ด้านล่างเป็น:
        background: url('bg.jpg') center/cover no-repeat fixed, #05172f;
     ─────────────────────────────────────────── */
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(20,60,120,0.4), transparent 60%),
    radial-gradient(ellipse 60% 80% at 10% 40%, rgba(120,30,40,0.25), transparent 55%),
    linear-gradient(180deg, #05172f 0%, #0a2550 40%, #051024 100%);
  background-attachment:fixed;
}

/* ════════════════════════════════════════════════════════
   ส่วน HERO (หัวเว็บ - โลโก้ + ชื่อ)
   ════════════════════════════════════════════════════════ */
.hero{
  position:relative;
  z-index:2;
  padding:40px 20px 32px;
  text-align:center;
}

/* 👉 แก้ตรงนี้ #2: ขนาดกล่องโลโก้ */
.emblem{
  width:92px;             /* ← แก้ขนาดได้ */
  height:92px;
  margin:0 auto 14px;
  display:flex;
  align-items:center;
  justify-content:center;
  filter:drop-shadow(0 4px 12px rgba(201,168,76,0.4));  /* เงาสีทอง */
}

.emblem img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.hero-title{
  color:#fff;
  font-size:30px;          /* 👉 แก้ขนาดตัวอักษรชื่อได้ */
  font-weight:700;
  letter-spacing:0.02em;
  text-shadow:0 2px 16px rgba(0,0,0,0.5);
  margin-bottom:4px;
}

.hero-sub{
  color:rgba(255,255,255,0.4);
  font-size:14px;
  font-weight:400;
  letter-spacing:0.12em;
}

/* ════════════════════════════════════════════════════════
   ส่วน CARD (กล่องขาวแสดงข้อมูล)
   ════════════════════════════════════════════════════════ */
.card{
  position:relative;
  z-index:2;
  background:#fff;
  margin:0 14px 24px;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 12px 40px rgba(0,0,0,0.4);
  animation:slideUp 0.5s ease both;
}

@keyframes slideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* แถวข้อมูลแต่ละบรรทัด */
.row{
  display:flex;
  align-items:center;
  padding:16px 20px;
  border-bottom:1px solid #e5e8ef;
  background:#fff;
  gap:8px;
}
.row:nth-child(even){background:#f4f5f8}  /* สลับสีเทา */
.row:last-child{border-bottom:none}

.row-label{
  color:#1a1a2e;
  font-size:14px;
  font-weight:700;
  flex-shrink:0;
}

.row-val{
  color:#2c3e5c;
  font-size:14px;
  font-weight:400;
  flex:1;
  word-break:break-word;
}

.row-val.mono{
  font-family:'Courier New',monospace;
  font-weight:500;
  letter-spacing:0.02em;
}

/* ป้ายสถานะสี */
.status-pill{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:3px 10px;
  border-radius:12px;
  font-size:12px;
  font-weight:600;
}
.status-pill .dot{width:6px;height:6px;border-radius:50%}
.status-active{background:#d1fae5;color:#065f46}
.status-active .dot{background:#10b981}
.status-repair{background:#fef3c7;color:#92400e}
.status-repair .dot{background:#f59e0b}
.status-broken{background:#fee2e2;color:#991b1b}
.status-broken .dot{background:#ef4444}

/* ════════════════════════════════════════════════════════
   Loading / Error state
   ════════════════════════════════════════════════════════ */
.state{
  padding:60px 24px;
  text-align:center;
  background:#fff;
}
.spinner{
  width:36px;height:36px;
  border:3px solid #e5e8ef;
  border-top-color:#1a3a6b;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto 14px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.state-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.state-sub{font-size:13px;color:#6b7280}
.state-icon{font-size:42px;margin-bottom:10px}

.footer{
  position:relative;
  z-index:2;
  text-align:center;
  color:rgba(255,255,255,0.3);
  font-size:11px;
  letter-spacing:0.08em;
  padding:8px 20px 28px;
}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════
     HERO SECTION
     ════════════════════════════════════════════════════════ -->
<div class="hero">

  <!-- 👉 แก้ตรงนี้ #3: โลโก้ กพ.ทร.
       ───────────────────────────────────────────
       ตอนนี้ใช้ emoji ⚓ เป็น placeholder
       ถ้าอยากใส่รูปโลโก้จริง ให้:
       1. วางไฟล์รูป (เช่น logo.png) ไว้โฟลเดอร์เดียวกับ index.html
       2. ลบบรรทัดที่เป็น emoji ⚓ ออก
       3. uncomment บรรทัด <img> ด้านล่าง
       ─────────────────────────────────────────── -->
  <div class="emblem">

    <!-- แบบที่ 1: ใช้ emoji (ตอนนี้ใช้อยู่) -->
    <span style="font-size:60px">⚓</span>

    <!-- แบบที่ 2: ใช้รูปจริง (เอา comment ออกเพื่อใช้งาน)
    <img src="logo.png" alt="กพ.ทร.">
    -->

  </div>

  <h1 class="hero-title">กรมกำลังพลทหารเรือ</h1>
  <p class="hero-sub">ครุภัณฑ์ กพ.ทร.</p>
</div>

<!-- ════════════════════════════════════════════════════════
     CARD - ข้อมูลครุภัณฑ์
     ════════════════════════════════════════════════════════ -->
<div class="card" id="card">

  <!-- Loading state -->
  <div class="state" id="loading">
    <div class="spinner"></div>
    <div class="state-title">กำลังโหลดข้อมูล...</div>
    <div class="state-sub">กรุณารอสักครู่</div>
  </div>

  <!-- Content (ซ่อนไว้จนกว่าจะโหลดเสร็จ) -->
  <div id="content" style="display:none">

    <!-- 👉 แก้ตรงนี้ #4: เพิ่ม/ลบ/แก้ไขแถวข้อมูลได้
         ───────────────────────────────────────────
         แต่ละแถวมีรูปแบบ:
         <div class="row">
           <div class="row-label">ข้อความหัว:</div>
           <div class="row-val" id="f-XXXX">-</div>
         </div>

         - ถ้าอยากเป็นตัวอักษร mono (เหมือน S/N) ใส่ class="row-val mono"
         - id ต้องขึ้นต้นด้วย f- แล้วตามด้วยชื่อคอลัมน์ใน Sheet
         ─────────────────────────────────────────── -->

    <div class="row"><div class="row-label">หมายเลขครุภัณฑ์:</div><div class="row-val mono" id="f-asset_id">-</div></div>
    <div class="row"><div class="row-label">หมายสินทรัพย์:</div><div class="row-val mono" id="f-property_no">-</div></div>
    <div class="row"><div class="row-label">ตราอักษร:</div><div class="row-val" id="f-brand">-</div></div>
    <div class="row"><div class="row-label">รุ่น:</div><div class="row-val" id="f-model">-</div></div>
    <div class="row"><div class="row-label">S/N CPU:</div><div class="row-val mono" id="f-sn_cpu">-</div></div>
    <div class="row"><div class="row-label">S/N Monitor:</div><div class="row-val mono" id="f-sn_monitor">-</div></div>
    <div class="row"><div class="row-label">ROM:</div><div class="row-val" id="f-hdd">-</div></div>
    <div class="row"><div class="row-label">RAM:</div><div class="row-val" id="f-ram">-</div></div>
    <div class="row"><div class="row-label">ผู้ใช้:</div><div class="row-val" id="f-user_name">-</div></div>
    <div class="row"><div class="row-label">สถานที่:</div><div class="row-val" id="f-location">-</div></div>
    <div class="row"><div class="row-label">วันที่รับ:</div><div class="row-val" id="f-received_date">-</div></div>
    <div class="row">
      <div class="row-label">สถานะ:</div>
      <div class="row-val">
        <span class="status-pill status-active" id="f-status-pill">
          <span class="dot"></span><span id="f-status">-</span>
        </span>
      </div>
    </div>
  </div>

  <!-- Error state -->
  <div class="state" id="error" style="display:none">
    <div class="state-icon">⚠️</div>
    <div class="state-title">ไม่พบข้อมูลครุภัณฑ์</div>
    <div class="state-sub" id="error-msg">กรุณาตรวจสอบ QR Code อีกครั้ง</div>
  </div>

</div>

<div class="footer">© กพ.ทร. ระบบครุภัณฑ์</div>

<script>
/* ════════════════════════════════════════════════════════
   ⚙️ ส่วนตั้งค่า (ต้องแก้)
   ════════════════════════════════════════════════════════ */

// 👉 แก้ตรงนี้ #5: ใส่ URL ของ Google Apps Script
// ─────────────────────────────────────────────
// 1. Deploy Apps Script แล้วจะได้ URL หน้าตาแบบ:
//    https://script.google.com/macros/s/xxxxxx/exec
// 2. เอามาวางแทนที่ 'YOUR_APPS_SCRIPT_URL_HERE'
// ─────────────────────────────────────────────
const API_URL = '

2.ข้อมูล ip กพ.กำลังดำเดินการลงข้อมูลในเว็บ ip.navy อยู่ครับ

import requests
import json
response_API = requests.get('https://script.google.com/macros/s/AKfycbxvD7d7WG1U4W4RdymF5qeLIqTl1xUDWw23QnvI5ZLr3R3Zy60PVNUV_b6rTnGx6FlbSQ/exec')

df = pd.read_json('data.json')

data = response_API.text

';


/* ════════════════════════════════════════════════════════
   ส่วน Logic (ไม่ต้องแก้)
   ════════════════════════════════════════════════════════ */

const STATUS_MAP = {
  'ใช้ราชการ': 'status-active',
  'ใช้งานอยู่': 'status-active',
  'ซ่อมบำรุง': 'status-repair',
  'ชำรุด': 'status-broken',
  'จำหน่าย': 'status-broken',
};

function set(id, val){
  const el = document.getElementById(id);
  if(el) el.textContent = val || '-';
}

function render(data){
  // ใส่ข้อมูลลงในแต่ละช่อง
  set('f-asset_id', data.asset_id);
  set('f-property_no', data.property_no);
  set('f-brand', data.brand);
  set('f-model', data.model);
  set('f-sn_cpu', data.sn_cpu);
  set('f-sn_monitor', data.sn_monitor);
  set('f-hdd', data.hdd ? ('HDD ' + data.hdd) : '-');
  set('f-ram', data.ram ? (String(data.ram).includes('GB') ? data.ram : data.ram + ' GB') : '-');
  set('f-user_name', data.user_name);
  set('f-location', data.location);
  set('f-received_date', data.received_date);

  // ป้ายสถานะ
  const status = data.status || 'ใช้ราชการ';
  set('f-status', status);
  document.getElementById('f-status-pill').className =
    'status-pill ' + (STATUS_MAP[status] || 'status-active');

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

function showError(msg){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error').style.display = 'block';
}

async function load(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  // ═══════════════════════════════════════════════
  // โหมดทดสอบ (Demo) - ใช้เมื่อยังไม่ได้ตั้ง API_URL
  // ═══════════════════════════════════════════════
  if(API_URL === 'https://script.google.com/macros/s/AKfycbx655bXgSAcYi7dYsehYxHl1sqUC4XgCdQwcAG-Nq7ZfVKeQ7-TSB9FoSWGFDJ9HfsK/exec'){
    setTimeout(() => {
      render({
        asset_id: id || '13000200-7010201-0001',
        property_no: '100000078428',
        brand: 'ACER',
        model: 'Veriton M2610G',
        sn_cpu: 'UDVDKST468P32121177848',
        sn_monitor: 'MMLS0SS005247012EF4216',
        hdd: '500 GB',
        ram: '4',
        user_name: 'พ.จ.อ.ธีรพงษ์ ทรัพย์เฉลิม',
        location: 'กวป.สพพ.กพ.ทร.',
        received_date: '5 เม.ย. 56',
        status: 'ใช้ราชการ'
      });
    }, 400);
    return;
  }

  if(!id){
    showError('ไม่ได้ระบุหมายเลขครุภัณฑ์ใน URL');
    return;
  }

  // เรียก API จริง
  try{
    const res = await fetch(API_URL + '?id=' + encodeURIComponent(id));
    const json = await res.json();
    if(json.success && json.data){
      render(json.data);
    } else {
      showError(json.error || 'ไม่พบข้อมูล');
    }
  } catch(err){
    showError('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้');
  }
}

load();
</script>
</body>
</html>
